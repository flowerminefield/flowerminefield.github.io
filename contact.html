<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — a04.org</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
        
        :root {
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --accent-red: #ef4444;
        }
        
        body {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
        }
        
        .accent-gradient {
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .card {
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-3xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="flex justify-between items-center mb-16 border-b border-zinc-800 pb-8">
            <div>
                <h1 class="text-4xl font-semibold tracking-tighter">A04</h1>
                <p class="text-zinc-400 text-sm mt-1">digital garden / thoughts / experiments</p>
            </div>
            <nav class="flex gap-6 text-sm uppercase tracking-widest">
<a href="/index.html" class="hover:text-red-400">Home</a>
<a href="/blog" class="hover:text-red-400">Blog</a>
<a href="/links.html" class="hover:text-red-400">Links</a>
<a href="/contact.html" class="text-purple-400">Contact</a>
            </nav>
        </header>

        <!-- Contact Card -->
        <div class="max-w-lg mx-auto">
            <div class="card border border-zinc-800 p-10">
                <div class="accent-gradient text-5xl font-bold tracking-tighter mb-10">
                    get in touch
                </div>

                <div class="space-y-8">
                    <div>
                        <p class="text-zinc-500 text-sm uppercase tracking-widest mb-1">Email</p>
                        <a href="mailto:you@email.com" 
                           class="text-xl text-zinc-200 hover:text-purple-400 break-all">
                            you@email.com
                        </a>
                    </div>

                    <div>
                        <p class="text-zinc-500 text-sm uppercase tracking-widest mb-3">Elsewhere</p>
                        <div class="flex flex-wrap gap-6 text-lg">
                            <a href="https://github.com/yourusername" target="_blank" 
                               class="hover:text-purple-400 flex items-center gap-2">
                                <i class="fab fa-github"></i> GitHub
                            </a>
                            <a href="https://x.com/yourusername" target="_blank" 
                               class="hover:text-pink-400 flex items-center gap-2">
                                <i class="fab fa-x-twitter"></i> X
                            </a>
                            <a href="#" target="_blank" 
                               class="hover:text-red-400 flex items-center gap-2">
                                <i class="fab fa-linkedin"></i> LinkedIn
                            </a>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-zinc-800">
                        <p class="text-zinc-400 text-sm leading-relaxed">
                            Currently open to interesting conversations, collab ideas, 
                            or just saying what’s up. No recruiters please.
                        </p>
                    </div>
                </div>
            </div>

            <div class="text-center mt-10">
                <a href="index.html" class="text-zinc-500 hover:text-zinc-300 text-sm flex items-center justify-center gap-2">
                    ← Back to home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
